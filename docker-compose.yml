# docker-compose.yml
# Real-Time Fraud Detection Pipeline
#
# Services:
#   Always-on  : zookeeper, kafka, pipeline, dashboard
#   On-demand  : producer, graph_builder, trainer
#     (use profiles so they don't auto-start)
#
# Quick-start:
#   docker-compose up -d zookeeper kafka
#   docker-compose up pipeline dashboard
#
# Producer (pick one):
#   docker-compose run --rm producer-1k       ← 1 000 transactions
#   docker-compose run --rm producer-5k       ← 5 000 transactions
#   docker-compose run --rm producer-10k      ← 10 000 transactions (default)
#   docker-compose run --rm producer-all      ← full 590 K dataset
#
# One-time setup:
#   docker-compose run --rm graph_builder
#   docker-compose run --rm trainer

x-app-base: &app-base          # shared config reused by every Python service
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - .:/app
  environment:
    - PYTHONPATH=/app
    - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: fraud_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: fraud_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Producer variants (profiles so they never auto-start) ──────────────────
  # Each is a separate service with its own fixed --limit.
  # Run with:  docker-compose run --rm producer-1k

  producer-1k:
    <<: *app-base
    container_name: fraud_producer_1k
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - python
      - producer/kafka_producer.py
      - --mode
      - fast
      - --limit
      - "1000"
    profiles: [producer]

  producer-5k:
    <<: *app-base
    container_name: fraud_producer_5k
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - python
      - producer/kafka_producer.py
      - --mode
      - fast
      - --limit
      - "5000"
    profiles: [producer]

  producer-10k:
    <<: *app-base
    container_name: fraud_producer_10k
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - python
      - producer/kafka_producer.py
      - --mode
      - fast
      - --limit
      - "10000"
    profiles: [producer]

  producer-all:
    <<: *app-base
    container_name: fraud_producer_all
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - python
      - producer/kafka_producer.py
      - --mode
      - realistic
      - --limit
      - "0"
    profiles: [producer]

  # ── One-time setup services ────────────────────────────────────────────────

  graph_builder:
    <<: *app-base
    container_name: fraud_graph_builder
    command:
      - python
      - graph/graph_builder.py
    profiles: [setup]

  trainer:
    <<: *app-base
    container_name: fraud_trainer
    command:
      - python
      - training/train_gnn.py
    profiles: [setup]

  # ── Always-on application services ────────────────────────────────────────

  pipeline:
    <<: *app-base
    container_name: fraud_pipeline
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - python
      - pipeline/streaming_pipeline.py

  dashboard:
    <<: *app-base
    container_name: fraud_dashboard
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8501:8501"
    command:
      - streamlit
      - run
      - dashboard/app.py
      - --server.address=0.0.0.0
      - --server.port=8501

networks:
  default:
    name: fraud_network